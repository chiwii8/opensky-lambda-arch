# Fichero docker-compose final
# En este fichero se incluyen todos los subficheros por capas. 


# Para evitar fallos con la asignación de las IPv4, se asignan en  función del orden descendente desde el fichero que se incluye  
include:
  - ./ingest/ingest-stack.yml   # Capa de ingesta de Datos
  - ./speed/speed-stack.yml     # Capa de Streaming
  - ./serving/serving-stack.yml # Capa de Almacenamiento DB
  # - ./batch/batch-stack.yml     # Capa de Batch, Posible ampliación si hay tiempo


name: opensky
services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource # Se añade el plugin para usar cassandra
    networks:
      sky-net:
        ipv4_address: 172.28.2.40     # Debería ser la última IP del sistema utilizada

networks:
  sky-net:
    ipam:
      driver: default
      config:
        - subnet: 172.28.2.0/24

volumes:
  kafka-data:
  cassandra-data: