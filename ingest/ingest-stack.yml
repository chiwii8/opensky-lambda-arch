# Subfichero Encargado de desplegar la Ingesta de Datos

# Contenedores
# Apache Kafka
# UI Kafka Redpanda Console, Se puede deshabilitar si no hay suficientes recursos
# Producer, consume los datos de una API y los envía a Kafka
# Conjunto de IPs utilizadas en este documento: .10 - .12 /24
services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:19092"]
      interval: 15s
      timeout: 10s
      retries: 5
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      sky-net:
        ipv4_address: 172.28.2.10

  
  # UI Para Apache Kafka (Redpanda Console)
  redpanda-console:
    image: redpandadata/console:v3.5.3
    container_name: kafka_redpanda-console
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:19092
      SCHEMAREGISTRY_ENABLED: "false"
    networks:
      sky-net:
         ipv4_address: 172.28.2.11


  # Kafka Producer, En desarrollo
  # ipv4_address: 172.28.2.12
  kafka-producer:
    build:
      context:  .
      dockerfile: producer/Dockerfile.producer
    container_name: kafka-producer
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:      # Variables de entorno requeridas para ejecutar el script
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      OPENSKY_URI: ${OPENSKY_URI}
    networks:
      sky-net:
        ipv4_address: 172.28.2.12


