# Subfichero que despliega los contenedores de la capa Streaming
# Contenedores:
# Apache Flink (Procesamiento en tiempo real)
# Plantilla de variables para las imagenes de apache flink

# Conjunto de IPs utilizadas .13 - .15  /24
x-flink-env:  &flink-env
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
  KAFKA_TOPIC: ${KAFKA_TOPIC}
  CASSANDRA_HOST: ${CASSANDRA_HOST}
  CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE}


services:
  flink-job:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: flink-jobmanager
    restart: always
    ports:
      - '8081:8081' # Interfaz web de flink
    volumes:
      - ./flink/consumer:/opt/flink/usrlib # Montamos la carpeta consumer para su uso en Dev
    command: jobmanager
    depends_on:   # Verificamos que kafka e influxdb esta activo antes de iniciar
      kafka:
        condition: service_healthy
    environment:
      <<: *flink-env
      FLINK_PROPERTIES: |
          jobmanager.rpc.address: flink-jobmanager
    networks:
      sky-net:
        ipv4_address: 172.28.2.13
  
  flink-task:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: flink-taskmanager
    restart: always
    depends_on:
      - flink-job
    command: taskmanager
    volumes:
      - ./flink:/opt/flink/usrlib
    networks:
      sky-net:
        ipv4_address: 172.28.2.14
    environment:
      <<: *flink-env
      FLINK_PROPERTIES: |
          jobmanager.rpc.address: flink-jobmanager
          taskmanager.numberOfTaskSlots: 2
          parallelism.default: 1

  # Servicio momentaneo para enviar el Trabajo a los contenedores de flink
  # Antes de su ejecución se verifica que los servicios esten levantados correctamente
  flink-job-submitter:
    build:
      context: .
      dockerfile: flink/Dockerfile
    container_name: flink-job-submitter
    depends_on:
      flink-job:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    # Este comando es la clave:
    command: >
      bash -c "sleep 15 && 
              flink run -d -m flink-jobmanager:8081 -py /opt/flink/usrlib/flights_consumer.py"
    volumes:
      - ./flink/jobs:/opt/flink/usrlib
    networks:
      sky-net:
        ipv4_address: 172.28.2.15
    environment:
      <<: *flink-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager